name: Build And Deploy

on:
  push:
    branches:
      - main # default branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
      - name: Checkout Theme Diversity
        uses: actions/checkout@v4
        with:
          repository: huazie/hexo-theme-diversity
          path: themes/diversity
      - name: Checkout Theme Phase
        uses: actions/checkout@v4
        with:
          repository: huazie/hexo-theme-phase
          path: themes/phase
      - name: Checkout Theme Light
        uses: actions/checkout@v4
        with:
          repository: huazie/hexo-theme-light
          path: themes/light
      - name: Checkout Theme Next
        uses: actions/checkout@v4
        with:
          repository: huazie/hexo-theme-next
          path: themes/next
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache
      - name: Install Dependencies
        run: npm install
      - name: Clean Main Site
        run: npm run clean
      - name: Build Main Site
        run: npm run build
      # 构建 diversity-comments-site
      - name: Checkout diversity-comments-site
        uses: actions/checkout@v4
        with:
          repository: huazie/diversity-comments-site
          path: temp-comments-site
      - name: Build Comments Site
        run: |
          cd temp-comments-site
          npm install
          npm run clean
          npm run build
          cd ..
          # 将构建产物复制到主站点的 public 目录下
          cp -r temp-comments-site/public/* public/
      - name: Clean existing game directory
        run: rm -rf public/diversity/game
      - name: Checkout Game
        uses: actions/checkout@v4
        with:
          repository: huazie/flea-game
          path: public/diversity/game
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4